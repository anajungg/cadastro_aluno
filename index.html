<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>



    <div class="container text-dark-emphasis borderrounded-3 shadow-lg p-3 mb-5 bg-body-tertiary rounded" style="margin-top:50px">
        <h3 id="titulo" class="text-center" style="margin-top:30px"><strong> Cadastro de Aluno </strong></h3>
        <p id="subtitulo" class="text-center" style="margin-bottom:50px"> Preencha os dados abaixo para realizar o registro completo do aluno no sistema acadêmico.</p>

        <form class="row g-3 needs-validation" novalidate>

            <div class="row mb-3">
                <div class="col">
                    <label for="nome" class="form-label">Nome Completo</label>
                    <input type="text" class="form-control" id="nome">
                    <div class="valid-feedback">
                    </div>
                </div>

                <div class="col">
                    <label for="cpf" class="form-label">CPF</label>
                    <input type="text" class="form-control" id="cpf">
                    <div class="valid-feedback">
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="data" class="form-label"> Data de nascimento</label>
                    <input type="date" class="form-control" id="data">
                    <div class="valid-feedback">
                    </div>
                </div>

                <div class="col">
                    <label for="telefone" class="form-label">Telefone</label>
                    <input type="text" class="form-control" id="telefone">
                    <div class="valid-feedback">
                    </div>
                </div>

                <div class="col">
                    <label for="email" class="form-label">Email</label>
                    <input type="text" class="form-control" id="email">
                    <div class="valid-feedback">
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="endereco" class="form-label">Endereço completo</label>
                    <input type="text" class="form-control" id="endereco" required>
                    <div class="invalid-feedback"></div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="cidade" class="form-label">Cidade</label>
                    <input type="text" class="form-control" id="cidade">
                    <div class="valid-feedback">
                    </div>
                </div>

                <div class="col">
                    <label for="estado" class="form-label">Estado</label>
                    <input type="text" class="form-control" id="estado">
                    <div class="valid-feedback">
                    </div>
                </div>

                <div class="col">
                    <label for="cep" class="form-label">CEP</label>
                    <input type="text" class="form-control" id="cep">
                    <div class="valid-feedback">
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col">
                    <label for="curso" class="form-label">Curso</label>
                    <input type="text" class="form-control" id="curso">
                    <div class="valid-feedback">
                    </div>
                </div>

                <div class="col">
                    <label for="matricula" class="form-label">Matrícula</label>
                    <input type="text" class="form-control" id="matricula">
                    <div class="valid-feedback">
                    </div>
                </div>
            </div>


            <div class="row mb-3">
                <div class="col">
                    <label for="senha" class="form-label">Senha</label>
                    <input type="text" class="form-control" id="senha">
                    <div class="valid-feedback">
                    </div>
                </div>

                <div class="col">
                    <label for="senha2" class="form-label">Confirmar Senha</label>
                    <input type="text" class="form-control" id="senha2">
                    <div class="valid-feedback">
                    </div>
                </div>
            </div>

            <div class="row mt-3">
                <button class="btn btn-primary" type="submit">Cadastrar Aluno</button>
            </div>
    </div>
    </form>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
