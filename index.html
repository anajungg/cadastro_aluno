<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  </head>
  <body>

     <div class="container"></div>

     <h3>Cadastro de Aluno</h3>
     <p>Preencha os dados abaixo para realizar o registro completo do aluno no sistema acadêmico.</p>

        <form action="" id="formulario">
             <label for="nome"> Nome completo</label>
            <input type="text" id="nome" placeholder="Nome">
            <div id="erroNome" class="erro"></div>

            <label for="cpf"> CPF </label>
            <input type="text" id="cpf" placeholder="Numero">
            <div id="erroCpf" class="erro"></div>

            <label for="idade"> Data de Nascimnto </label>
            <input type="date" id="data" placeholder="Data">
            <div id="erroData" class="erro"></div>

            <label for="telefone"> Telefone </label>
            <input type="tel" id="telefone" placeholder="Telefone">
            <div id="erroTelefone" class="erro"></div>

            <label for="email"> Email </label>
            <input type="email" id="email" placeholder="Email">
            <div id="erroEmail" class="erro"></div>

            <label for="endereco"> Endereço completo </label>
           <input type="textarea" id="endereco" placeholder="Endereco">
           <div id="erroEndereco" class="erro"></div>

            <label for="cidade"> Cidade </label>
            <input type="text" id="cidade" placeholder="Cidade">
            <div id="erroCidade" class="erro"></div>

            <label for="estado"> Estado </label>
            <input type="text" id="estado" placeholder="Estado>
            <div id="erroEstado" class="erro"></div>

            <label for="estado"> Estado </label>
            <input type="text" id="estado" placeholder="Estado>
            <div id="erroEstado" class="erro"></div>

            <br> <br>

            <label for="Quintal"> Casa ou apartamento? </label>
            <select id="moradia">
            <option value="selecione">Selecione</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
            </select>

            <br> <br>

            <label for="Quintal"> Possui quintal?</label>
            <select id="quintal">
            <option value="selecione">Selecione</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
            </select>

            <br> <br>

            <label for="possuinte"> Já teve pet antes? </label>
            <select id="animal">
            <option value="selecione">Selecione</option>
            <option value="teve">Sim</option>
            <option value="naoteve">Não</option>
            </select>

            <br> <br>

           <label for="horas"> Quantas horas o animal irá ficar sozinho? </label>
           <input type="number" id="horas" placeholder="Horas">
           <div id="erroHoras" class="erro"></div>

           <br> <br>

           <label for="Motivo de adoção"> Motivo da adoção: </label>
           <input type="textarea" id="motivo" placeholder="Motivo">
           <div id="erroMotivo" class="erro"></div>

           <br> <br>
           
           <label for="condiçoes"> Quais são suas condições? </label>
            <select id="condiçoes">
            <option value="selecione">Selecione</option>
            <option value="sim">boa</option>
            <option value="razoavel">razoável</option>
            <option value="ruim">ruim</option>
            </select>

            <br> <br>

            <label>Quando decidiu adotar?</label>
            <select id="decisao">
            <option value="selecione">Selecione</option>
            <option value="hoje">Hoje</option>
            <option value="antes">Já vinha pensando</option>
            </select>

            <br> <br>

            <label>Informação sobre o local:</label>
            <select id="local">
            <option value="selecione">Selecione</option>
            <option value="permite">Permite animais (apartamento)</option>
            <option value="seguro">Quintal seguro (casa)</option>
            </select>

            <br> <br>

            <label>Motivo da adoção:</label>
            <textarea id="motivo" placeholder="Escreva o motivo aqui..."></textarea>

            <br> <br>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
